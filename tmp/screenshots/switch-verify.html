<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root { --primary:#a65f3e; --input:#a65f3e; --background:#f4efe4; --primary-foreground:#f4efe4; --foreground:#f4efe4; }
  body { margin:0; background:#1f3629; font-family: Arial, sans-serif; }
  #dashboard-theme-scope { min-height:260px; background:#1f3629; color:#f4efe4; padding:48px; }
  .panel { width:620px; border-top:1px solid rgba(244,239,228,.18); padding-top:16px; }
  .title { font-weight:700; font-size:16px; margin-bottom:12px; }
  .buttons { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .shape { height:48px; border-radius:10px; border:1px solid rgba(244,239,228,.28); color:#f4efe4; font-weight:700; font-size:20px; }
  .shape.active { background:#a65f3e; }
  .shape.idle { background:#304838; }
  .row { display:flex; align-items:center; justify-content:flex-start; gap:10px; border-radius:9999px; font-size:20px; font-weight:700; line-height:1; color:#f4efe4; margin-top:16px; }
  #dashboard-theme-scope [data-slot=switch] { position:relative !important; display:inline-flex; flex-shrink:0; width:2.75rem !important; min-width:2.75rem !important; height:1.5rem !important; min-height:1.5rem !important; padding:0 !important; border-radius:9999px !important; align-items:initial !important; border:0; background:#a65f3e; }
  #dashboard-theme-scope [data-slot=switch-thumb] { position:absolute !important; left:0.125rem !important; top:0.125rem !important; width:1.25rem !important; height:1.25rem !important; border-radius:9999px !important; background:#f4efe4; }
  #dashboard-theme-scope [data-slot=switch][data-state=unchecked] [data-slot=switch-thumb] { transform:translateX(0) !important; }
  #dashboard-theme-scope [data-slot=switch][data-state=checked] [data-slot=switch-thumb] { transform:translateX(1.25rem) !important; }
</style>
</head>
<body>
<div id="dashboard-theme-scope">
  <div class="panel">
    <div class="title">Logo shape</div>
    <div class="buttons"><button class="shape active">Circle</button><button class="shape idle">Rectangle</button></div>
    <label class="row">
      <button id="switch-off" data-slot="switch" data-state="unchecked" role="switch" aria-checked="false"><span data-slot="switch-thumb" data-state="unchecked"></span></button>
      <span>White logo background</span>
    </label>
    <label class="row">
      <button id="switch-on" data-slot="switch" data-state="checked" role="switch" aria-checked="true"><span data-slot="switch-thumb" data-state="checked"></span></button>
      <span>White logo background</span>
    </label>
  </div>
</div>
<script>
  const result = {};
  for (const id of ['switch-off', 'switch-on']) {
    const sw = document.getElementById(id).getBoundingClientRect();
    const th = document.querySelector('#' + id + ' [data-slot="switch-thumb"]').getBoundingClientRect();
    result[id] = { switch: { x: sw.x, y: sw.y, width: sw.width, height: sw.height }, thumb: { x: th.x, y: th.y, width: th.width, height: th.height } };
  }
  document.body.dataset.metrics = JSON.stringify(result);
</script>
</body>
</html>
