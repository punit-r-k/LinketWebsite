<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile spacing verification before</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #202020;
        font-family: Arial, sans-serif;
        color: #f4f0e8;
      }
      .viewport {
        width: 390px;
        min-height: 844px;
        margin: 0 auto;
        background: #294434;
      }
      .navbar {
        position: sticky;
        top: 0;
        z-index: 50;
        height: 102px;
        border-bottom: 1px solid rgba(218, 201, 169, 0.35);
        background: linear-gradient(90deg, #1d3325, #111);
      }
      .shell {
        height: calc(844px - 102px);
        overflow: auto;
      }

      .content {
        min-height: 1200px;
        padding: 16px;
      }
      .section {
        position: sticky;
        top: calc(102px + 0.125rem);
        height: 46px;
        max-width: 260px;
        margin: 0 auto 16px;
        border: 1px solid rgba(218, 201, 169, 0.45);
        border-radius: 999px;
        display: grid;
        place-items: center;
        font-weight: 700;
        background: rgba(43, 70, 54, 0.96);
      }
      .status {
        position: sticky;
        top: calc(102px + 3.25rem);
        min-height: 142px;
        border: 1px solid rgba(218, 201, 169, 0.45);
        border-radius: 22px;
        padding: 18px;
        background: rgba(49, 77, 59, 0.96);
      }
      .label {
        margin: 0 0 12px;
        color: #f4d77d;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <main class="viewport">
      <div class="navbar"></div>
      <div class="shell">
        <section class="content">
          <p class="label">Before</p>
          <div class="section">Profile</div>
          <div class="status">
            <strong>Live profile</strong>
            <p>Last saved: 09:55 PM</p>
            <p>Preview and public page use this same saved profile data.</p>
          </div>
        </section>
      </div>
    </main>
    <script>
      window.addEventListener("load", () => {
        document.querySelector(".shell").scrollTo(0, 160);
      });
    </script>
  </body>
</html>
